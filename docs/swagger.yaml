basePath: /
definitions:
  pkg_server.webrtcOfferResponse:
    properties:
      answer:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 'Voila voice pipeline server: WebSocket and WebRTC transport endpoints.'
  title: Voila API
  version: "1.0"
paths:
  /webrtc/offer:
    post:
      consumes:
      - application/json
      description: Accepts a WebRTC SDP offer and returns an SDP answer. Available
        when transport is smallwebrtc or both.
      parameters:
      - description: JSON body with 'offer' (SDP offer string)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_server.webrtcOfferResponse'
        "400":
          description: Invalid offer or handling failed
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
      summary: Submit WebRTC offer
      tags:
      - webrtc
swagger: "2.0"
